<script type="module">
        import { registerPlugin, CapacitorHttp } from '@capacitor/core';
        import { Geolocation } from '@capacitor/geolocation';
        const BackgroundGeolocation = registerPlugin('BackgroundGeolocation');

        const FIREBASE_REST_URL = "https://sos-alvorada-botao-default-rtdb.firebaseio.com/ocorrencias/";
        const WHATSAPP_NUMBER = "5551989670061";
        
        let watcherId = null;
        let ocorrenciaUnica = "SOS-" + Math.floor(1000 + Math.random() * 9000);
        let isProcessing = false;
        
        let latestLat = null;
        let latestLon = null;
        let latestAcc = null;

        function showScreen(screenId) {
            ['start-screen', 'tracking-screen', 'offline-screen'].forEach(id => {
                document.getElementById(id).style.display = (id === screenId) ? 'block' : 'none';
            });
        }

        window.addEventListener('offline', () => { if (watcherId !== null) showScreen('offline-screen'); });
        window.addEventListener('online', () => { if(document.getElementById('offline-screen').style.display === 'block') startTracking(); });

        document.getElementById('btn-start').addEventListener('click', startTracking);
        document.getElementById('btn-sos').addEventListener('click', dispatchEmergency);
        
        document.getElementById('btn-check-gps').addEventListener('click', () => {
            document.getElementById('gps-blocker').style.display = 'none'; 
            startTracking(); 
        });

        async function startTracking() {
            if (!navigator.onLine) { showScreen('offline-screen'); return; }

            showScreen('tracking-screen');
            document.getElementById('ocorrencia-id').innerText = ocorrenciaUnica;

            try {
                // 1. Pede a permissão ANTES de tentar ler o GPS
                const permissions = await Geolocation.requestPermissions();
                if (permissions.location !== 'granted') {
                    document.getElementById('gps-blocker').style.display = 'flex';
                    return;
                }

                // 2. Inicia o olheiro de segundo plano direto, sem limite de tempo de 5 segundos
                watcherId = await BackgroundGeolocation.addWatcher(
                    {
                        backgroundMessage: "A transmitir localização em segundo plano para a Guarda Municipal.",
                        backgroundTitle: "Botão Lilás Ativo",
                        requestPermissions: true, 
                        stale: false,
                        distanceFilter: 5 
                    },
                    function callback(location, error) {
                        if (error) {
                            console.error("Erro no GPS Nativo:", error);
                            document.getElementById('gps-blocker').style.display = 'flex'; 
                            return;
                        }

                        // Se leu com sucesso, esconde a tela vermelha
                        document.getElementById('gps-blocker').style.display = 'none';

                        latestLat = location.latitude;
                        latestLon = location.longitude;
                        latestAcc = location.accuracy.toFixed(0);

                        document.getElementById('val-lat').innerText = latestLat.toFixed(6);
                        document.getElementById('val-lon').innerText = latestLon.toFixed(6);
                        document.getElementById('val-acc').innerText = latestAcc + " metros";
                        document.getElementById('btn-sos').disabled = false;

                        enviarSinalNativo();
                    }
                );
            } catch (err) {
                console.error("Erro ao iniciar rastreio:", err);
                document.getElementById('gps-blocker').style.display = 'flex';
            }
        }

        async function enviarSinalNativo() {
            if (!latestLat || !latestLon) return;

            const horaAtual = new Date().toLocaleTimeString();
            const urlFinal = `${FIREBASE_REST_URL}${ocorrenciaUnica}.json`;
            
            const payload = {
                latitude: latestLat,
                longitude: latestLon,
                precisao: latestAcc,
                atualizadoEm: horaAtual,
                status: "ativo"
            };

            try {
                await CapacitorHttp.patch({
                    url: urlFinal,
                    headers: { 'Content-Type': 'application/json' },
                    data: payload
                });

                const syncEl = document.getElementById('sync-time');
                if (syncEl) {
                    syncEl.style.display = 'inline-block';
                    syncEl.innerText = "Sync: " + horaAtual;
                }
            } catch (error) {
                console.error("Erro crítico de envio nativo:", error);
            }
        }

        function dispatchEmergency() {
            if (isProcessing || !latestLat || !latestLon) return;
            isProcessing = true;
            document.getElementById('btn-sos').disabled = true;
            document.getElementById('btn-sos').innerText = "A ENVIAR ALERTA...";

            const mapsUrl = `https://www.google.com/maps?q=${latestLat},${latestLon}`;
            const painelUrl = `https://dgiinfra2026.github.io/sistema-auxilia-teste/painel.html?id=${ocorrenciaUnica}`;
            const messageText = `🚨 *ALERTA BOTÃO LILÁS*\n\nOcorrência: *${ocorrenciaUnica}*\nESTOU EM PERIGO!\n\n📍 *Localização no momento do alerta:*\n${mapsUrl}\n\n🛰️ *Acompanhe o meu movimento ao vivo no painel:*\n${painelUrl}`;
            
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(messageText)}`;
            
            window.open(whatsappUrl, '_blank');
            
            setTimeout(() => { 
                isProcessing = false; 
                document.getElementById('btn-sos').disabled = false;
                document.getElementById('btn-sos').innerText = "🚨 ENVIAR ALERTA À GUARDA";
            }, 5000);
        }
    </script>
